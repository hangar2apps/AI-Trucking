# Host reverse proxy for autonomousfreight.2iwin.com
# Place on your server (e.g. /etc/nginx/sites-available/autonomousfreight)
# Then: sudo ln -s .../autonomousfreight /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name autonomousfreight.2iwin.com;

    location / {
        proxy_pass http://127.0.0.1:7779;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# After certbot:
# sudo certbot --nginx -d autonomousfreight.2iwin.com
